<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAPPA TRADEMART — Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#0d0d0d;color:#fff;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;text-align:center;padding:24px
    }
    .wrap{max-width:340px}
    img{width:110px;height:110px;object-fit:cover;border-radius:20px;margin-bottom:24px;box-shadow:0 0 28px rgba(232,93,4,.45)}
    h1{font-size:1.4rem;font-weight:800;margin-bottom:8px;color:#e85d04}
    p{font-size:.92rem;color:rgba(255,255,255,.65);line-height:1.7;margin-bottom:28px}
    .badge{
      display:inline-flex;align-items:center;gap:8px;
      background:rgba(232,93,4,.15);border:1.5px solid rgba(232,93,4,.4);
      border-radius:999px;padding:8px 18px;font-size:.82rem;color:#f97316;font-weight:600;
      margin-bottom:28px
    }
    button{
      width:100%;padding:14px;border:none;border-radius:12px;
      background:linear-gradient(135deg,#e85d04,#f97316);
      color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;
      letter-spacing:.3px
    }
    button:active{opacity:.85}
  </style>
</head>
<body>
  <div class="wrap">
    <img src="images/photo_2026-05-30_17-40-49-Photoroom.png" alt="HAPPA TRADEMART logo" onerror="this.style.display='none'">
    <h1>You're Offline</h1>
    <p>No internet connection found. Please check your connection and try again. Your cart and recently viewed items are still available.</p>
    <div class="badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
      No internet connection
    </div>
    <button onclick="location.reload()">🔄 Try Again</button>
  </div>
</body>
</html>
